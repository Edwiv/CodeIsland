name: Publish GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without a leading v, e.g. 1.0.29.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: codeisland-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, notarize, publish, and update appcast
    runs-on: macos-15
    env:
      BUILD_ARCH: universal
      CODEISLAND_RELEASE_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      NOTARY_PROFILE: CodeIsland
      REQUIRE_DEVELOPER_ID: "1"
      REQUIRE_NOTARIZATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_VERSION#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Version is required." >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,3}([-.][A-Za-z0-9]+)?$ ]]; then
            echo "Version '$VERSION' does not look like a Sparkle-safe version." >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Validate required secrets
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            MACOS_CERTIFICATE_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_KEYCHAIN_PASSWORD \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            SPARKLE_ED_PRIVATE_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Check release/tag/appcast availability
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "Run this workflow from main because SUFeedURL points at main/appcast.xml." >&2
            exit 1
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists." >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists." >&2
            exit 1
          fi
          if grep -q "<sparkle:version>${VERSION}</sparkle:version>" appcast.xml; then
            echo "appcast.xml already contains version $VERSION." >&2
            exit 1
          fi

      - name: Select Xcode 26
        shell: bash
        run: |
          set -euo pipefail
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -type d | sort | tail -n 1)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "Xcode 26 is required to compile AppIcon.icon." >&2
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Install DMG tooling
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi

      - name: Import Developer ID certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/codeisland-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          printf '%s' "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "NOTARY_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Store notarization credentials
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --keychain "$NOTARY_KEYCHAIN" \
            --validate

      - name: Bump bundle version for release build
        shell: bash
        run: |
          set -euo pipefail
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Info.plist
          plutil -lint Info.plist

      - name: Build signed and notarized DMG
        shell: bash
        run: ./scripts/build-dmg.sh "$VERSION"

      - name: Verify release artifact
        shell: bash
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 .build/dmg-staging/CodeIsland.app
          codesign -dvvv --entitlements :- .build/dmg-staging/CodeIsland.app
          spctl -a -t open --context context:primary-signature -vv .build/CodeIsland.dmg
          xcrun stapler validate .build/CodeIsland.dmg
          ls -lh .build/CodeIsland.dmg

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          NOTES="$RUNNER_TEMP/release-notes.md"
          if ./scripts/extract-changelog.sh "$VERSION" > "$NOTES" 2>/dev/null; then
            true
          else
            {
              echo "CodeIsland $VERSION"
              echo
              git log --oneline -20
            } > "$NOTES"
          fi
          echo "RELEASE_NOTES=$NOTES" >> "$GITHUB_ENV"

      - name: Update Sparkle appcast
        shell: bash
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: ./scripts/update-appcast.sh "$VERSION" .build/CodeIsland.dmg

      - name: Commit release metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Info.plist appcast.xml
          git commit -m "release: v${VERSION}"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          args=(
            release create "$TAG"
            ".build/CodeIsland.dmg#CodeIsland.dmg"
            --target "$(git rev-parse HEAD)"
            --title "CodeIsland $VERSION"
            --notes-file "$RELEASE_NOTES"
          )
          gh "${args[@]}"
